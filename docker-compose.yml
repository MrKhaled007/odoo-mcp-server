version: "3.9"

# =============================================================================
# odoo-mcp-server — Local development stack
#
# Boots Odoo 19 + PostgreSQL 16 alongside this MCP server.
# Use this for local development and demos. NOT production-ready.
#
# Usage:
#   docker compose up -d           # start everything
#   docker compose logs -f mcp     # follow MCP server logs
#   docker compose down            # stop everything
#   docker compose down -v         # stop AND wipe data
# =============================================================================

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:19
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
    # First boot: visit http://localhost:8069 to create the demo database

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - odoo
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    # MCP servers usually run over stdio, but for development we may run
    # this container interactively. See docs/CLAUDE_DESKTOP_SETUP.md.
    stdin_open: true
    tty: true

volumes:
  odoo-db-data:
  odoo-web-data:
